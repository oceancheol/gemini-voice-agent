<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AgentLab Voice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <header>
      <div class="logo">AgentLab</div>
      <div class="logo-sub">Voice Agent</div>
    </header>

    <!-- Agent selection -->
    <div class="agent-selector">
      <button class="agent-btn active" data-agent="wonyo">원영</button>
      <button class="agent-btn" data-agent="jisoo">지수</button>
      <button class="agent-btn" data-agent="rose">로즈</button>
      <button class="agent-btn" data-agent="lisa">리사</button>
      <button class="agent-btn" data-agent="jenny">제니</button>
    </div>

    <!-- Call display -->
    <div class="call-display">
      <div class="avatar-wrap" id="avatar-wrap">
        <div class="avatar-ring"></div>
        <div class="avatar" id="avatar">🌸</div>
      </div>
      <div class="agent-name" id="agent-name">원영</div>
      <div class="call-status" id="call-status">통화 대기</div>
    </div>

    <!-- Transcript -->
    <div class="transcript" id="transcript">
      <div class="transcript-inner" id="transcript-inner"></div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="call-btn" id="call-btn" aria-label="통화 시작">
        <svg class="icon-call" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/>
        </svg>
        <svg class="icon-end" viewBox="0 0 24 24" fill="currentColor" style="display:none">
          <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.67 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08A.996.996 0 0 1 0 12.37c0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.66c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.1-.7-.28a11.27 11.27 0 0 0-2.67-1.85.998.998 0 0 1-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/>
        </svg>
      </button>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
